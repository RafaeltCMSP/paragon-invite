<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Aniversário da Janynne</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    body {
      background: #F7F0F3;
      align-items: stretch;
      padding: 0;
      min-height: 100dvh;
    }

    /* ===== Login ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .login-card {
      max-width: 360px;
      width: 100%;
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin-bottom: 4px;
    }

    /* ===== Dashboard ===== */
    #dashboard { display: none; flex-direction: column; min-height: 100dvh; }

    .admin-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
    }

    .admin-header h1 {
      font-size: 1.1rem;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
    }

    .admin-header span {
      font-size: 0.8rem;
      opacity: 0.8;
      display: block;
      font-family: 'Nunito', sans-serif;
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 7px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .admin-content { padding: 20px 16px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* ===== Stats ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

    .stat-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .stat-card .stat-icon { font-size: 1.6rem; margin-bottom: 6px; display: block; }
    .stat-card .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--primary-dark);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== Controls ===== */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    .search-input:focus { border-color: var(--primary); }

    .btn-csv {
      padding: 10px 18px;
      background: var(--gold-light);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-csv:hover { background: var(--gold); color: #fff; }

    /* ===== Table ===== */
    .table-wrap {
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      min-width: 700px;
    }

    thead tr {
      background: linear-gradient(135deg, #FDF4F0 0%, #FFF8E6 100%);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 12px 14px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #F5EFF2;
      color: var(--text);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #FDF8FB; }

    .td-name { font-weight: 700; }

    .td-phone a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .td-phone a:hover { text-decoration: underline; }

    .td-date { color: var(--text-muted); font-size: 0.82rem; white-space: nowrap; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge-paid    { background: #EDFBF4; color: var(--success); }
    .badge-pending { background: #FFF8E6; color: var(--gold); }
    .badge-no      { background: #F5EFF2; color: var(--text-muted); }
    .badge-rejected { background: #FEF2F2; color: var(--error); }

    /* Copy button */
    .btn-copy-link {
      padding: 5px 12px;
      background: var(--gold-light);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      white-space: nowrap;
    }

    .btn-copy-link:hover { background: var(--gold); color: #fff; }

    .btn-view-ticket {
      padding: 5px 12px;
      background: var(--primary-light);
      border: 1.5px solid var(--primary);
      color: var(--primary-dark);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-view-ticket:hover { background: var(--primary); color: #fff; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 10px 24px;
      border-radius: 100px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      font-family: 'Nunito', sans-serif;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading row */
    .loading-row td {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- ===== Login ===== -->
  <div id="login-screen">
    <div class="card login-card pop-in">
      <div style="font-size:2.2rem;margin-bottom:12px">🔐</div>
      <h1>Painel Administrativo</h1>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:24px">
        Aniversário da Janynne
      </p>

      <div class="field">
        <label for="password-input">Senha de acesso</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="error-banner" id="login-error">Senha incorreta.</div>

      <button class="btn btn-primary" id="login-btn" onclick="doLogin()" style="margin-top:8px">
        <span id="login-btn-text">Entrar</span>
        <span class="spinner" id="login-spinner" style="display:none"></span>
      </button>
    </div>
  </div>

  <!-- ===== Dashboard ===== -->
  <div id="dashboard">

    <div class="admin-header">
      <div>
        <h1>🎂 Aniversário da Janynne</h1>
        <span>Painel de Convidados</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>

    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-icon">🎉</span>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Confirmados</div>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🎁</span>
          <div class="stat-value" id="stat-pix">—</div>
          <div class="stat-label">Com PIX</div>
        </div>
        <div class="stat-card">
          <span class="stat-icon">💰</span>
          <div class="stat-value" id="stat-amount">—</div>
          <div class="stat-label">Arrecadado</div>
        </div>
        <div class="stat-card">
          <span class="stat-icon">⏳</span>
          <div class="stat-value" id="stat-pending">—</div>
          <div class="stat-label">Pendentes</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="🔍 Buscar por nome ou telefone..."
          oninput="filterTable()"
        />
        <button class="btn-csv" onclick="downloadCSV()">⬇️ Exportar CSV</button>
        <button class="btn-csv" style="background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark)" onclick="loadGuests()">↺ Atualizar</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <div class="table-scroll">
          <table id="guests-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>WhatsApp</th>
                <th>Confirmado em</th>
                <th>PIX</th>
                <th>Valor</th>
                <th>Pagamento</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr class="loading-row">
                <td colspan="8">
                  <div style="display:flex;align-items:center;justify-content:center;gap:12px">
                    <span class="spinner" style="color:var(--primary)"></span>
                    Carregando convidados...
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allGuests = []
    let adminSecret = ''

    // ---- Login ----
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin()
    })

    async function doLogin() {
      const pwd = document.getElementById('password-input').value
      if (!pwd) return

      document.getElementById('login-btn-text').textContent = 'Verificando...'
      document.getElementById('login-spinner').style.display = 'inline-block'
      document.getElementById('login-btn').disabled = true
      document.getElementById('login-error').classList.remove('visible')

      const res = await fetch('/api/admin-guests', { headers: { 'x-admin-secret': pwd } })

      if (res.status === 401) {
        document.getElementById('login-error').classList.add('visible')
        document.getElementById('login-btn-text').textContent = 'Entrar'
        document.getElementById('login-spinner').style.display = 'none'
        document.getElementById('login-btn').disabled = false
        document.getElementById('password-input').value = ''
        return
      }

      adminSecret = pwd
      sessionStorage.setItem('admin_secret', pwd)
      const data = await res.json()
      allGuests  = data.guests || []

      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('dashboard').style.display    = 'flex'

      renderTable(allGuests)
      renderStats(allGuests)
    }

    function logout() {
      sessionStorage.removeItem('admin_secret')
      adminSecret = ''
      allGuests   = []
      document.getElementById('login-screen').style.display = 'flex'
      document.getElementById('dashboard').style.display    = 'none'
      document.getElementById('password-input').value = ''
    }

    async function loadGuests() {
      const tbody = document.getElementById('table-body')
      tbody.innerHTML = '<tr class="loading-row"><td colspan="8"><div style="display:flex;align-items:center;justify-content:center;gap:12px"><span class="spinner" style="color:var(--primary)"></span>Atualizando...</div></td></tr>'
      const res     = await fetch('/api/admin-guests', { headers: { 'x-admin-secret': adminSecret } })
      const data    = await res.json()
      allGuests     = data.guests || []
      renderTable(allGuests)
      renderStats(allGuests)
      showToast('Lista atualizada ✓')
    }

    // ---- Render ----
    function renderStats(guests) {
      const total    = guests.length
      const withPix  = guests.filter(g => g.wants_to_gift).length
      const paid     = guests.filter(g => g.payments?.[0]?.status === 'approved')
      const amount   = paid.reduce((sum, g) => sum + (g.payments[0].amount || 0), 0)
      const pending  = guests.filter(g => g.payments?.[0]?.status === 'pending').length

      document.getElementById('stat-total').textContent   = total
      document.getElementById('stat-pix').textContent     = withPix
      document.getElementById('stat-amount').textContent  = `R$${amount.toFixed(0)}`
      document.getElementById('stat-pending').textContent = pending
    }

    function renderTable(guests) {
      const tbody = document.getElementById('table-body')

      if (!guests.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><span class="icon">🎈</span>Nenhum convidado confirmado ainda.</div></td></tr>`
        return
      }

      tbody.innerHTML = guests.map((g, i) => {
        const pay         = g.payments?.[0]
        const payStatus   = pay?.status || null
        const amount      = pay?.amount ? `R$ ${Number(pay.amount).toFixed(2).replace('.', ',')}` : '—'
        const date        = g.confirmed_at ? new Date(g.confirmed_at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—'
        const phone       = g.phone.replace(/\D/g, '')
        const waLink      = `https://wa.me/55${phone}`

        let statusBadge
        if (!g.wants_to_gift) {
          statusBadge = '<span class="badge badge-no">Sem PIX</span>'
        } else if (payStatus === 'approved') {
          statusBadge = '<span class="badge badge-paid">✓ Pago</span>'
        } else if (payStatus === 'pending') {
          statusBadge = '<span class="badge badge-pending">Pendente</span>'
        } else if (payStatus === 'rejected' || payStatus === 'cancelled') {
          statusBadge = '<span class="badge badge-rejected">Recusado</span>'
        } else {
          statusBadge = '<span class="badge badge-no">—</span>'
        }

        const inviteActions = g.invite_url
          ? `<button class="btn-copy-link" onclick="copyLink('${esc(g.invite_url)}')">📋 Copiar</button>
             <a class="btn-view-ticket" href="${esc(g.invite_url)}" target="_blank">🎟️ Ver</a>`
          : '<span style="color:var(--text-muted);font-size:0.8rem">—</span>'

        return `
          <tr data-search="${esc(g.name.toLowerCase())} ${esc(g.phone)}">
            <td style="color:var(--text-muted);font-size:0.8rem">${i + 1}</td>
            <td class="td-name">${esc(g.name)}</td>
            <td class="td-phone"><a href="${waLink}" target="_blank" rel="noopener">${esc(g.phone)}</a></td>
            <td class="td-date">${date}</td>
            <td>${g.wants_to_gift ? '<span class="badge badge-paid">Sim</span>' : '<span class="badge badge-no">Não</span>'}</td>
            <td style="font-weight:700;color:var(--text)">${amount}</td>
            <td>${statusBadge}</td>
            <td style="display:flex;gap:6px;flex-wrap:wrap">${inviteActions}</td>
          </tr>`
      }).join('')
    }

    function filterTable() {
      const q     = document.getElementById('search-input').value.toLowerCase().trim()
      const rows  = document.querySelectorAll('#table-body tr[data-search]')
      rows.forEach(row => {
        row.style.display = row.dataset.search.includes(q) ? '' : 'none'
      })
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => showToast('Link copiado! ✓'))
    }

    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2500)
    }

    function esc(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
    }

    // ---- CSV ----
    function downloadCSV() {
      if (!allGuests.length) return
      const rows = [['Nome','Telefone','Confirmado em','Quer PIX','Valor','Status Pagamento','Link Convite']]
      allGuests.forEach(g => {
        const pay = g.payments?.[0]
        rows.push([
          g.name,
          g.phone,
          g.confirmed_at ? new Date(g.confirmed_at).toLocaleString('pt-BR') : '',
          g.wants_to_gift ? 'Sim' : 'Não',
          pay?.amount ? `R$ ${Number(pay.amount).toFixed(2).replace('.', ',')}` : '',
          pay?.status || '',
          g.invite_url || '',
        ])
      })
      const csv   = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n')
      const blob  = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' })
      const url   = URL.createObjectURL(blob)
      const link  = document.createElement('a')
      link.href   = url
      link.download = `convidados-janynne-${new Date().toISOString().slice(0,10)}.csv`
      link.click()
      URL.revokeObjectURL(url)
    }

    // ---- Auto-login if session exists ----
    ;(async () => {
      const saved = sessionStorage.getItem('admin_secret')
      if (!saved) return
      adminSecret = saved
      const res = await fetch('/api/admin-guests', { headers: { 'x-admin-secret': saved } })
      if (!res.ok) { sessionStorage.removeItem('admin_secret'); return }
      const data = await res.json()
      allGuests  = data.guests || []
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('dashboard').style.display    = 'flex'
      renderTable(allGuests)
      renderStats(allGuests)
    })()
  </script>
</body>
</html>
